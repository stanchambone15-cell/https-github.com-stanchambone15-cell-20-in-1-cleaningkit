<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLNR Pro — Neon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 1. BASIS INSTELLINGEN */
        body { margin:0; font-family:'Inter',sans-serif; background:#05050a; color:white; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        
        /* 2. HERO SECTION */
        .hero { text-align:center; padding:50px 20px; display: flex; flex-direction: column; align-items: center; }
        .brand-tag { color:#3a86ff; font-weight:bold; letter-spacing: 3px; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; }
        h1 { font-size:32px; text-shadow: 0 0 15px #3a86ff; margin: 0 0 25px 0; font-weight: 900; text-transform: uppercase; line-height: 1.1; }
        
        /* 3. AI/CSS GEGENEREERDE AFBEELDING (DIT WERKT ALTIJD) */
        .product-image-container {
            width: 100%;
            max-width: 350px;
            height: 220px; /* Hoogte van het 'plaatje' */
            background: radial-gradient(circle at center, #102141 0%, #05050a 100%);
            border: 2px solid #3a86ff;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(58,134,255,0.4), inset 0 0 15px rgba(58,134,255,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        /* Neon gloed effect binnenin */
        .product-image-container::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: #3a86ff;
            filter: blur(50px);
            opacity: 0.3;
            border-radius: 50%;
        }

        /* Tekst in de placeholder */
        .placeholder-text-main {
            font-weight: 900;
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 10px #3a86ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        .placeholder-text-sub {
            font-size: 12px;
            color: #3a86ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 5px;
            position: relative;
            z-index: 1;
        }
        
        /* 4. PRIJS EN HOOFDKNOP */
        .price-container { margin-bottom: 25px; }
        .price { font-size:36px; color:#f0c96e; font-weight:800; }
        .old-price { text-decoration:line-through; color:#444; font-size:18px; margin-right:12px; }
        
        .main-btn { 
            background: #3a86ff; padding:20px 0; color:white; 
            cursor:pointer; font-size:18px; font-weight:800; border-radius:14px; 
            box-shadow: 0 10px 20px rgba(58,134,255,0.3); text-transform: uppercase;
            width: 100%; max-width: 320px; text-decoration: none; display: inline-block;
            border: none; transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.98); box-shadow: 0 5px 10px rgba(58,134,255,0.3); }

        /* 5. BESTEL SECTIE */
        .section { padding:60px 20px; max-width:500px; margin:auto; border-top: 1px solid #1a1a2e; text-align: center; }
        h2 { font-weight: 900; text-transform: uppercase; margin-bottom: 25px; font-size: 22px; color: #3a86ff; }
        
        input { 
            width:100%; padding:18px; margin:8px 0; background:#0a0a15; border:1px solid #1a1a2e; 
            color:white; border-radius:12px; box-sizing:border-box; font-size:16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3a86ff; box-shadow: 0 0 10px rgba(58,134,255,0.2); }

        /* 6. TWEE BESTEL KNOPPEN */
        .button-grid { display: flex; gap: 12px; margin-top: 25px; }
        .order-btn { 
            flex: 1; padding: 20px; border-radius: 12px; font-weight: 800; border: none; 
            cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.2s;
        }
        .wa-btn { background: #25D366; color: black; }
        .msg-btn { background: #ffffff; color: black; }
        
        /* 7. MOBIELE OPTIMALISATIE */
        @media (max-width: 480px) {
            .button-grid { flex-direction: column; }
            h1 { font-size: 28px; }
            .product-image-container { height: 180px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="brand-tag">Professional cleaning kit</div>
    <h1>CLNR PRO<br>20-IN-1 NEON</h1>
    
    <div class="product-image-container">
        <div class="placeholder-text-main">CLNR PRO</div>
        <div class="placeholder-text-sub">NEON EDITION</div>
    </div>
    
    <div class="price-container">
        <span class="old-price">€39,99</span>
        <span class="price">€19,99</span>
    </div>
    
    <a href="#checkout" class="main-btn">BESTEL NU</a>
</div>

<div class="section" id="checkout">
    <h2>VERZENDGEGEVENS</h2>
    <input type="text" id="name" placeholder="Volledige Naam">
    <input type="text" id="address" placeholder="Straat + Huisnummer">
    <input type="text" id="city" placeholder="Postcode + Woonplaats">
    
    <div class="button-grid">
        <button class="order-btn wa-btn" onclick="sendOrder('wa')">WhatsApp ✅</button>
        <button class="order-btn msg-btn" onclick="sendOrder('sms')">iMessage ✉️</button>
    </div>
</div>

<script>
    // 10x GECHECKTE VERZENDFUNCTIE
    function sendOrder(method) {
        const name = document.getElementById('name').value;
        const address = document.getElementById('address').value;
        const city = document.getElementById('city').value;
        const myNumber = "31657088358"; // Jouw nummer

        if (!name || !address || !city) {
            alert("Vul alsjeblieft al je gegevens in!");
            return;
        }

        // Maak het berichtje
        const message = `Bestelling CLNR Pro! 🚀\n\nProduct: Neon 20-in-1 Kit\n\nNaam: ${name}\nAdres: ${address}\nStad: ${city}`;
        
        // Codeer het berichtje voor internet-links
        const encodedMessage = encodeURIComponent(message);

        if (method === 'wa') {
            // Opent WhatsApp
            window.location.href = `https://wa.me/${myNumber}?text=${encodedMessage}`;
        } else {
            // Opent SMS/iMessage
            window.location.href = `sms:${myNumber}?body=${encodedMessage}`;
        }
    }
</script>

</body>
</html>
