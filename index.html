<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLNR Pro — Neon Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    body { margin:0; font-family:'Inter',sans-serif; background:#05050a; color:white; scroll-behavior: smooth; }
    .hero { text-align:center; padding:40px 20px; }
    h1 { font-size:36px; text-shadow: 0 0 10px #3a86ff, 0 0 20px #3a86ff; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; }
    
    /* Stijl voor de afbeelding */
    .product-img { 
        width:100%; 
        max-width:350px; 
        border-radius:15px; 
        margin: 20px 0; 
        border: 2px solid #3a86ff; 
        box-shadow: 0 0 20px rgba(58,134,255,0.6);
        display: inline-block;
        min-height: 200px;
        background: #111;
    }
    
    .price { font-size:32px; color:#f0c96e; font-weight:800; }
    .old { text-decoration:line-through; color:#444; font-size:18px; margin-right:10px; }
    .btn { background:transparent; padding:18px 20px; border: 2px solid #3a86ff; color:white; cursor:pointer; font-size:16px; font-weight:700; margin-top:20px; width:100%; max-width:400px; border-radius:10px; display:inline-block; text-decoration:none; box-shadow: inset 0 0 10px #3a86ff, 0 0 15px #3a86ff; text-transform: uppercase; }
    .section { padding:40px 20px; max-width:600px; margin:auto; border-top: 1px solid #1a1a2e; }
    input { width:100%; padding:15px; margin:10px 0; background:#0a0a15; border:1px solid #3a86ff; color:white; border-radius:8px; box-sizing:border-box; font-size:16px; }
    
    .button-container { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
    .order-btn { flex: 1; min-width: 140px; padding: 15px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; color: black; font-size: 14px; }
    .wa-btn { background: #25D366; box-shadow: 0 0 15px rgba(37, 211, 102, 0.5); }
    .msg-btn { background: #007AFF; box-shadow: 0 0 15px rgba(0, 122, 255, 0.5); color: white; }
</style>
</head>
<body>

<div class="hero">
    <p style="color:#3a86ff; font-weight:bold; letter-spacing: 3px;">ULTIMATE TECH CARE</p>
    <h1>CLNR PRO NEON</h1>
    
    <img src="https://ae-pic-a1.aliexpress-media.com/kf/S8f0997e076634860803565e71887e2216.jpg" 
         class="product-img" 
         onerror="this.src='https://via.placeholder.com/400x400/3a86ff/ffffff?text=CLNR+PRO+20-IN-1'"
         alt="20-in-1 Cleaning Kit">
    
    <p><span class="old">€39,99</span> <span class="price">€19,99</span></p>
    <button class="btn" onclick="scrollToCheckout()">BESTEL NU</button>
</div>

<div class="section" id="checkout">
    <h2>BESTELGEGEVENS</h2>
    <input id="name" placeholder="Je Volledige Naam">
    <input id="address" placeholder="Straat + Huisnummer">
    <input id="city" placeholder="Postcode + Stad">
    
    <div class="button-container">
        <button class="order-btn wa-btn" onclick="order('wa')">WhatsApp ✅</button>
        <button class="order-btn msg-btn" onclick="order('sms')">iMessage ✉️</button>
    </div>
</div>

<script>
function scrollToCheckout(){
    document.getElementById("checkout").scrollIntoView({behavior:"smooth"});
}

function order(type){
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let city = document.getElementById("city").value;

    if(!name || !address || !city){
        alert("Vul eerst even je gegevens in!");
        return;
    }

    let myNumber = "31657088358";
    let message = `Bestelling CLNR Pro! 🚀\n\nNaam: ${name}\nAdres: ${address}\nStad: ${city}`;

    if(type === 'wa'){
        window.location.href = "https://wa.me/" + myNumber + "?text=" + encodeURIComponent(message);
    } else {
        window.location.href = "sms:" + myNumber + "?body=" + encodeURIComponent(message);
    }
}
</script>

</body>
</html>
